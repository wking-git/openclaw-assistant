<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            letter-spacing: 3px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        #game-board {
            width: 400px;
            height: 400px;
            background: #0a0a0a;
            border: 3px solid #00ff88;
            border-radius: 10px;
            position: relative;
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(20, 1fr);
        }

        .cell {
            width: 100%;
            height: 100%;
        }

        .snake {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border-radius: 3px;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
        }

        .snake-head {
            background: linear-gradient(135deg, #00ffaa, #00dd77);
            border-radius: 5px;
            box-shadow: 0 0 12px rgba(0, 255, 170, 0.8);
        }

        .food {
            background: radial-gradient(circle, #ff6b6b, #ee5a5a);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255, 107, 107, 0.8);
            animation: pulse 0.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.85); }
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .score-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #start-btn {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #1a1a2e;
        }

        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        #pause-btn {
            background: linear-gradient(135deg, #ffd93d, #f5c800);
            color: #1a1a2e;
        }

        #pause-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 217, 61, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .instructions span {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            margin: 0 5px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 2px solid #ff6b6b;
        }

        .game-over h2 {
            color: #ff6b6b;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .game-over p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .game-over button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    
    <div class="game-container">
        <div id="game-board">
            <div class="game-over" id="game-over">
                <h2>游戏结束</h2>
                <p>最终得分: <span id="final-score">0</span></p>
                <button onclick="restartGame()">重新开始</button>
            </div>
        </div>
        
        <div class="controls">
            <div class="score-display">得分: <span id="score">0</span></div>
            <button id="start-btn" onclick="startGame()">开始游戏</button>
            <button id="pause-btn" onclick="togglePause()" disabled>暂停</button>
        </div>
        
        <div class="instructions">
            使用 <span>↑ ↓ ← →</span> 或 <span>W A S D</span> 控制方向
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_SIZE = 20;
        const CELL_COUNT = BOARD_SIZE * BOARD_SIZE;
        const INITIAL_SPEED = 150;
        const SPEED_INCREMENT = 5;
        const MIN_SPEED = 60;

        // 游戏状态
        let snake = [];
        let food = null;
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameLoop = null;
        let isGameRunning = false;
        let isPaused = false;
        let currentSpeed = INITIAL_SPEED;

        // DOM 元素
        const gameBoard = document.getElementById('game-board');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        // 初始化游戏板
        function initBoard() {
            gameBoard.innerHTML = '';
            for (let i = 0; i < CELL_COUNT; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;
                gameBoard.appendChild(cell);
            }
            gameBoard.appendChild(gameOverScreen);
        }

        // 获取单元格索引
        function getCellIndex(x, y) {
            return y * BOARD_SIZE + x;
        }

        // 更新单元格样式
        function updateCell(x, y, className) {
            const cell = document.getElementById(`cell-${getCellIndex(x, y)}`);
            if (cell) {
                cell.className = `cell ${className}`;
            }
        }

        // 清除单元格
        function clearCell(x, y) {
            const cell = document.getElementById(`cell-${getCellIndex(x, y)}`);
            if (cell) {
                cell.className = 'cell';
            }
        }

        // 生成食物
        function spawnFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * BOARD_SIZE),
                    y: Math.floor(Math.random() * BOARD_SIZE)
                };
            } while (isSnakeAt(newFood.x, newFood.y));
            
            food = newFood;
            updateCell(food.x, food.y, 'food');
        }

        // 检查蛇是否在指定位置
        function isSnakeAt(x, y) {
            return snake.some(segment => segment.x === x && segment.y === y);
        }

        // 初始化蛇
        function initSnake() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
        }

        // 渲染蛇
        function renderSnake() {
            snake.forEach((segment, index) => {
                const className = index === 0 ? 'snake-head' : 'snake';
                updateCell(segment.x, segment.y, className);
            });
        }

        // 开始游戏
        function startGame() {
            if (isGameRunning) return;
            
            // 重置游戏状态
            score = 0;
            currentSpeed = INITIAL_SPEED;
            scoreElement.textContent = score;
            gameOverScreen.style.display = 'none';
            
            initBoard();
            initSnake();
            renderSnake();
            spawnFood();
            
            isGameRunning = true;
            isPaused = false;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            pauseBtn.textContent = '暂停';
            
            gameLoop = setInterval(gameStep, currentSpeed);
        }

        // 游戏步进
        function gameStep() {
            if (isPaused) return;
            
            direction = { ...nextDirection };
            
            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };
            
            // 检查撞墙
            if (newHead.x < 0 || newHead.x >= BOARD_SIZE || 
                newHead.y < 0 || newHead.y >= BOARD_SIZE) {
                gameOver();
                return;
            }
            
            // 检查撞到自己
            if (isSnakeAt(newHead.x, newHead.y)) {
                gameOver();
                return;
            }
            
            // 移动蛇
            snake.unshift(newHead);
            updateCell(newHead.x, newHead.y, 'snake-head');
            
            // 更新原来头部的样式
            if (snake.length > 1) {
                updateCell(head.x, head.y, 'snake');
            }
            
            // 检查是否吃到食物
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                spawnFood();
                
                // 加速
                if (currentSpeed > MIN_SPEED) {
                    currentSpeed -= SPEED_INCREMENT;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, currentSpeed);
                }
            } else {
                // 移除尾巴
                const tail = snake.pop();
                clearCell(tail.x, tail.y);
            }
        }

        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            finalScoreElement.textContent = score;
            gameOverScreen.style.display = 'block';
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        // 重新开始
        function restartGame() {
            gameOverScreen.style.display = 'none';
            startGame();
        }

        // 暂停/继续
        function togglePause() {
            if (!isGameRunning) return;
            
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            const key = e.key.toLowerCase();
            
            // 防止反向移动
            switch(key) {
                case 'arrowup':
                case 'w':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    e.preventDefault();
                    break;
                case 'arrowdown':
                case 's':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    e.preventDefault();
                    break;
                case 'arrowleft':
                case 'a':
                    if (direction.x === 0) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    e.preventDefault();
                    break;
                case 'arrowright':
                case 'd':
                    if (direction.x === 0) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    e.preventDefault();
                    break;
                case ' ':
                    togglePause();
                    e.preventDefault();
                    break;
            }
        });

        // 初始化
        initBoard();
    </script>
</body>
</html>
